<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>
    <!-- Подключаем Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"  rel="stylesheet">
</head>
<body>

<!-- Навигационное меню -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Medinova</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">О компании</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'service_list' %}">Услуги</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'feedback' %}">Контакты</a></li>
            </ul>
            {% if user.is_authenticated %}
            <span class="navbar-text me-2">Здравствуйте, {{ user.username }}</span>
            <a href="{% url 'profile' %}" class="btn btn-outline-light me-2">Личный кабинет</a>
            <a href="{% url 'logout' %}" class="btn btn-danger">Выход</a>
            {% else %}
            <a href="{% url 'login' %}" class="btn btn-outline-light me-2">Войти</a>
            <a href="{% url 'register' %}" class="btn btn-success">Регистрация</a>
            {% endif %}
        </div>
    </div>
</nav>

<!-- Основной контент будет подставляться здесь -->
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<!-- Подключаем JS Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
