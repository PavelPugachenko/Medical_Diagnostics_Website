{% extends "base.html" %}
{% block title %}Услуги{% endblock %}
{% block content %}
<h1>Наши услуги</h1>
<div class="row">
    {% for service in services %}
    <div class="col-md-4 mb-3">
        <div class="card">
            {% if service.image %}
            <img src="{{ service.image.url }}" class="card-img-top" alt="{{ service.title }}">
            {% else %}
             <img src="/media/services/images.png" alt="Изображение отсутствует">
            {% endif %}
            <div class="card-body">
                <h5 class="card-title">{{ service.title }}</h5>
                <p class="card-text">{{ service.description|truncatewords:10 }}</p>
                <a href="{% url 'service_detail' service.pk %}" class="btn btn-primary">Подробнее</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
