{% extends "base.html" %}
{% block content %}
<h2>Личный кабинет</h2>
<p>Имя: {{ user.username }}</p>
<p>Email: {{ user.email }}</p>

<h4>Ваши записи:</h4>
<ul>
    {% for app in appointments %}
    <li>{{ app.service }} — {{ app.date }} в {{ app.time }}</li>
    {% empty %}
    <li>У вас нет записей</li>
    {% endfor %}
</ul>
{% endblock %}
